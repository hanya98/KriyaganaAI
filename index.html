<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kriyagni AI — Finance Research</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0A0F1E;
    --navy-2: #111827;
    --navy-3: #1C2537;
    --navy-4: #243049;
    --accent: #00C896;
    --accent-dim: rgba(0,200,150,0.12);
    --accent-glow: rgba(0,200,150,0.25);
    --gold: #F0B429;
    --red: #F04E37;
    --blue: #3B82F6;
    --text-1: #F0F4FF;
    --text-2: #A8B5CC;
    --text-3: #5C6B8A;
    --border: rgba(255,255,255,0.07);
    --border-2: rgba(255,255,255,0.12);
    --card: rgba(255,255,255,0.03);
    --card-hover: rgba(255,255,255,0.06);
    --font-display: 'Instrument Serif', serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html, body {
    background: var(--navy);
    color: var(--text-1);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    height: 100%;
    overflow: hidden;
  }

  .app { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    display: flex;
    align-items: center;
    gap: 0;
    height: 52px;
    background: var(--navy-2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding: 0 20px;
    position: relative;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-right: 32px;
    flex-shrink: 0;
    text-decoration: none;
  }

  .logo-mark {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 16px; height: 16px; }

  .logo-name {
    font-family: var(--font-display);
    font-size: 17px;
    color: var(--text-1);
    letter-spacing: -0.2px;
  }

  .logo-badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent-glow);
    border-radius: 3px;
    padding: 1px 5px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .ticker-strip {
    flex: 1;
    overflow: hidden;
    position: relative;
    height: 100%;
    display: flex;
    align-items: center;
    margin: 0 20px;
  }

  .ticker-strip::before,
  .ticker-strip::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 40px;
    z-index: 2;
    pointer-events: none;
  }

  .ticker-strip::before {
    left: 0;
    background: linear-gradient(to right, var(--navy-2), transparent);
  }

  .ticker-strip::after {
    right: 0;
    background: linear-gradient(to left, var(--navy-2), transparent);
  }

  .ticker-scroll {
    display: flex;
    align-items: center;
    gap: 0;
    animation: tickerScroll 30s linear infinite;
    white-space: nowrap;
  }

  @keyframes tickerScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 18px;
    border-right: 1px solid var(--border);
    font-size: 12px;
    font-family: var(--font-mono);
  }

  .t-sym { color: var(--text-2); font-weight: 500; }
  .t-price { color: var(--text-1); }
  .t-chg.up { color: var(--accent); }
  .t-chg.down { color: var(--red); }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }

  .nav-link {
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text-2);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    border: 1px solid transparent;
  }

  .nav-link:hover {
    color: var(--text-1);
    background: var(--card-hover);
  }

  .nav-link.active {
    color: var(--accent);
    background: var(--accent-dim);
    border-color: var(--accent-glow);
  }

  .nav-link svg { width: 14px; height: 14px; }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: 20px;
    flex-shrink: 0;
  }

  .avatar-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00C896, #0066FF);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    border: 2px solid var(--border-2);
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-2);
    transition: all 0.15s;
  }

  .icon-btn:hover {
    color: var(--text-1);
    background: var(--card-hover);
  }

  .icon-btn svg { width: 16px; height: 16px; }

  .sub-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 24px;
    background: var(--navy-2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .search-wrap {
    flex: 1;
    max-width: 680px;
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--navy-3);
    border: 1px solid var(--border-2);
    border-radius: 8px;
    padding: 10px 48px 10px 40px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text-1);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input::placeholder { color: var(--text-3); }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .search-ico {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-3);
  }

  .search-ico svg {
    width: 16px;
    height: 16px;
    display: block;
  }

  .search-btn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--accent);
    color: var(--navy);
    font-weight: 600;
    font-size: 12px;
    border: none;
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .search-btn:hover { opacity: 0.85; }

  .sub-filters {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .filter-chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-2);
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-chip:hover {
    color: var(--text-1);
    border-color: var(--border-2);
  }

  .filter-chip.active {
    color: var(--accent);
    background: var(--accent-dim);
    border-color: var(--accent-glow);
  }

  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .left-col {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .left-col::-webkit-scrollbar { width: 4px; }
  .left-col::-webkit-scrollbar-track { background: transparent; }
  .left-col::-webkit-scrollbar-thumb {
    background: var(--border-2);
    border-radius: 2px;
  }

  .right-panel {
    width: 300px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: var(--navy-2);
  }

  .right-panel::-webkit-scrollbar { width: 4px; }
  .right-panel::-webkit-scrollbar-track { background: transparent; }
  .right-panel::-webkit-scrollbar-thumb {
    background: var(--border-2);
    border-radius: 2px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-title-action {
    font-size: 11px;
    font-weight: 400;
    color: var(--accent);
    text-transform: none;
    letter-spacing: 0;
    cursor: pointer;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .metric-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: default;
    transition: border-color 0.15s;
  }

  .metric-card:hover { border-color: var(--border-2); }

  .metric-label {
    font-size: 10px;
    color: var(--text-3);
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .metric-value {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--text-1);
  }

  .metric-change {
    font-family: var(--font-mono);
    font-size: 11px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .metric-change.up { color: var(--accent); }
  .metric-change.down { color: var(--red); }

  .answer-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
    min-height: 120px;
  }

  .answer-box.loading { border-color: var(--accent-glow); }

  .answer-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .ai-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent-glow);
    border-radius: 5px;
    padding: 3px 8px;
  }

  .ai-badge svg { width: 12px; height: 12px; }

  .answer-query {
    font-size: 13px;
    color: var(--text-2);
    flex: 1;
  }

  .answer-content {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-2);
  }

  .answer-content p { margin-bottom: 10px; }

  .answer-content strong {
    color: var(--text-1);
    font-weight: 500;
  }

  .answer-content .highlight {
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 13px;
  }

  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%,100% { opacity:1; }
    50% { opacity:0; }
  }

  .answer-sources {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .source-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-3);
    background: var(--navy-3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 9px;
  }

  .source-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--blue);
  }

  .results-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .result-item {
    padding: 14px 16px;
    border-radius: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 8px;
  }

  .result-item:hover {
    background: var(--card-hover);
    border-color: var(--border-2);
  }

  .result-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .result-source-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
    background: var(--navy-3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 6px;
    color: var(--text-3);
  }

  .result-time {
    font-size: 11px;
    color: var(--text-3);
  }

  .result-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-1);
    margin-bottom: 5px;
    line-height: 1.4;
  }

  .result-snippet {
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.6;
  }

  .result-tags {
    display: flex;
    gap: 5px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .r-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    background: var(--navy-3);
    color: var(--text-3);
    border: 1px solid var(--border);
  }

  .r-tag.green {
    background: rgba(0,200,150,0.1);
    color: var(--accent);
    border-color: var(--accent-glow);
  }

  .r-tag.red {
    background: rgba(240,78,55,0.1);
    color: var(--red);
    border-color: rgba(240,78,55,0.2);
  }

  .r-tag.gold {
    background: rgba(240,180,41,0.1);
    color: var(--gold);
    border-color: rgba(240,180,41,0.2);
  }

  .watchlist-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .watchlist-row:last-child { border-bottom: none; }

  .watchlist-row:hover { opacity: 0.8; }

  .w-sym {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-1);
  }

  .w-name {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 1px;
  }

  .w-price {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-1);
    text-align: right;
  }

  .w-chg {
    font-family: var(--font-mono);
    font-size: 11px;
    text-align: right;
  }

  .w-chg.up { color: var(--accent); }
  .w-chg.down { color: var(--red); }

  .sector-row { margin-bottom: 12px; }
  .sector-row:last-child { margin-bottom: 0; }

  .sector-info {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
  }

  .sector-name {
    font-size: 12px;
    color: var(--text-2);
  }

  .sector-val {
    font-size: 12px;
    font-family: var(--font-mono);
  }

  .bar-track {
    height: 4px;
    background: var(--navy-3);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
  }

  .prompts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .prompt-btn {
    padding: 10px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--text-2);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.4;
  }

  .prompt-btn:hover {
    background: var(--card-hover);
    border-color: var(--border-2);
    color: var(--text-1);
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .error-msg {
    color: var(--red);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }

  .welcome-icon {
    width: 48px;
    height: 48px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-glow);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .welcome-title {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--text-1);
    margin-bottom: 8px;
  }

  .welcome-sub {
    font-size: 13px;
    color: var(--text-3);
    max-width: 340px;
    line-height: 1.6;
  }

  * {
    scrollbar-width: thin;
    scrollbar-color: var(--border-2) transparent;
  }
</style>
</head>
<body>
</body>
</html>
